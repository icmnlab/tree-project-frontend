<script>
        // Simple script to toggle states visually for demonstration
        document.querySelectorAll('input[type="checkbox"]').forEach(cb => {
            cb.addEventListener('change', (e) => {
                const label = e.target.closest('label');
                if(e.target.checked) {
                    label.classList.add('border-primary', 'bg-primary-fixed/10');
                    label.classList.remove('border-outline-variant');
                } else {
                    label.classList.remove('border-primary', 'bg-primary-fixed/10');
                    label.classList.add('border-outline-variant');
                }
            });
        });
        
        // Initialize checked state styling
        document.querySelectorAll('input[type="checkbox"]:checked').forEach(cb => {
            const label = cb.closest('label');
            label.classList.add('border-primary', 'bg-primary-fixed/10');
            label.classList.remove('border-outline-variant');
        });
    </script>
