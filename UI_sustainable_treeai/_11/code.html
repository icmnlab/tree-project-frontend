<body class="bg-surface text-on-surface antialiased min-h-screen flex items-center justify-center p-4 md:p-8 relative overflow-hidden">
<!-- Decorative background elements -->
<div class="absolute top-0 left-0 w-full h-full overflow-hidden -z-10 pointer-events-none">
<div class="absolute top-[-10%] right-[-5%] w-[40vw] h-[40vw] rounded-full bg-primary/5 blur-[100px]"></div>
<div class="absolute bottom-[-10%] left-[-10%] w-[50vw] h-[50vw] rounded-full bg-secondary-container/20 blur-[120px]"></div>
</div>
<!-- Main Registration Card -->

<!-- Form Section -->
<div class="w-full md:w-1/2 p-6 sm:p-10 lg:p-14 flex flex-col justify-center">
<div class="mb-stack-lg flex items-center gap-2">
<div class="w-8 h-8 rounded-lg bg-primary-container text-on-primary-container flex items-center justify-center">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">eco</span>
</div>
<span class="font-headline-sm text-headline-sm text-primary tracking-tight">Forest Intelligence</span>
</div>
<h1 class="font-display-md-mobile text-display-md-mobile md:font-display-md md:text-display-md text-on-surface mb-2">
                註冊新帳號
            </h1>
<p class="font-body-md text-body-md text-on-surface-variant mb-8">
                加入我們的碳審計調查員網絡，開始精準的環境數據採集。
            </p>
<form action="#" class="flex flex-col gap-5" method="POST">
<!-- Name Field -->
<div class="flex flex-col gap-1">
<label class="font-label-md text-label-md text-on-surface ml-1" for="name">姓名</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline-variant pointer-events-none">person</span>
<input class="w-full h-touch-target-min pl-12 pr-4 bg-transparent border border-outline-variant rounded-lg font-body-md text-body-md text-on-surface placeholder:text-outline-variant focus:border-primary focus:ring-1 focus:ring-primary transition-all outline-none" id="name" name="name" placeholder="輸入您的真實姓名" required="" type="text"/>
</div>
</div>
<!-- Account ID Field -->
<div class="flex flex-col gap-1">
<label class="font-label-md text-label-md text-on-surface ml-1" for="account_id">帳號 ID</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline-variant pointer-events-none">badge</span>
<input class="w-full h-touch-target-min pl-12 pr-4 bg-transparent border border-outline-variant rounded-lg font-body-md text-body-md text-on-surface placeholder:text-outline-variant focus:border-primary focus:ring-1 focus:ring-primary transition-all outline-none" id="account_id" name="account_id" placeholder="設定登入帳號" required="" type="text"/>
</div>
</div>
<!-- Password Field -->
<div class="flex flex-col gap-1">
<label class="font-label-md text-label-md text-on-surface ml-1" for="password">密碼</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline-variant pointer-events-none">lock</span>
<input class="w-full h-touch-target-min pl-12 pr-12 bg-transparent border border-outline-variant rounded-lg font-body-md text-body-md text-on-surface placeholder:text-outline-variant focus:border-primary focus:ring-1 focus:ring-primary transition-all outline-none" id="password" name="password" placeholder="請輸入至少 8 位字元" required="" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-outline-variant hover:text-on-surface transition-colors" type="button">
<span class="material-symbols-outlined">visibility_off</span>
</button>
</div>
</div>
<!-- Invite Code Field (Required) -->
<div class="flex flex-col gap-1">
<label class="font-label-md text-label-md text-on-surface ml-1 flex items-center gap-1" for="invite_code">
                        邀請碼 <span class="text-error">*</span>
</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline-variant pointer-events-none">key</span>
<input class="w-full h-touch-target-min pl-12 pr-4 bg-transparent border border-outline-variant rounded-lg font-body-md text-body-md text-on-surface placeholder:text-outline-variant focus:border-primary focus:ring-1 focus:ring-primary transition-all outline-none bg-surface-container-low" id="invite_code" name="invite_code" placeholder="輸入組織發放的邀請碼" required="" type="text"/>
</div>
<p class="font-label-md text-label-md text-outline ml-1 mt-1">此為必填欄位，請向區域負責人索取。</p>
</div>

<div class="mt-4 flex flex-col gap-4">
<button class="w-full h-touch-target-min bg-primary-container text-on-primary-container font-label-lg text-label-lg rounded-full hover:bg-primary hover:text-on-primary transition-all duration-200 active:scale-[0.98] flex items-center justify-center gap-2 shadow-sm" type="submit">
                        提交申請
                        <span class="material-symbols-outlined text-[20px]">arrow_forward</span>
</button>
<div class="text-center">
<a class="font-label-md text-label-md text-primary hover:text-surface-tint transition-colors underline-offset-4 hover:underline" href="#">
                            已有帳號？立即登入
                        </a>
</div>
</div>

<div class="absolute bottom-10 left-10 right-10 z-20 text-white">
<div class="inline-flex items-center gap-2 px-3 py-1.5 rounded-full bg-white/20 backdrop-blur-md border border-white/30 mb-4">
<span class="material-symbols-outlined text-[16px]">satellite_alt</span>
<span class="font-label-md text-label-md">v2.4.0-Stable</span>
</div>
<h2 class="font-display-md text-display-md mb-2 text-white">精確追蹤每一棵樹的碳匯價值。</h2>
<p class="font-body-md text-body-md text-white/80 max-w-md">
                    Forest Intelligence 專為專業林業人員打造，在極端戶外環境下提供穩定、高對比的數據輸入體驗。
