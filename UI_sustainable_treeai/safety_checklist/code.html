<!DOCTYPE html>

<html lang="zh-TW"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Safety Checklist - Forest Intelligence</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "primary-container": "#004e8b",
                        "on-primary-fixed-variant": "#004881",
                        "surface-variant": "#e1e2e8",
                        "on-error-container": "#93000a",
                        "inverse-surface": "#2e3035",
                        "error": "#ba1a1a",
                        "inverse-primary": "#a2c9ff",
                        "on-tertiary": "#ffffff",
                        "on-error": "#ffffff",
                        "on-primary": "#ffffff",
                        "tertiary": "#5a007c",
                        "on-tertiary-fixed": "#320047",
                        "outline": "#727781",
                        "primary-fixed-dim": "#a2c9ff",
                        "tertiary-fixed": "#f8d8ff",
                        "surface-dim": "#d9dadf",
                        "on-secondary-fixed": "#002204",
                        "secondary": "#1b6d24",
                        "surface-container-highest": "#e1e2e8",
                        "inverse-on-surface": "#f0f0f6",
                        "tertiary-fixed-dim": "#ebb2ff",
                        "surface-tint": "#24609e",
                        "surface-container-low": "#f3f3f9",
                        "on-secondary-container": "#207128",
                        "on-background": "#191c20",
                        "on-surface": "#191c20",
                        "error-container": "#ffdad6",
                        "secondary-fixed-dim": "#87d982",
                        "surface-bright": "#f8f9ff",
                        "surface": "#f8f9ff",
                        "on-secondary-fixed-variant": "#005312",
                        "tertiary-container": "#781b9f",
                        "on-primary-container": "#91c0ff",
                        "outline-variant": "#c2c7d1",
                        "on-tertiary-container": "#e7a5ff",
                        "secondary-container": "#a0f499",
                        "on-tertiary-fixed-variant": "#721199",
                        "surface-container-high": "#e7e8ee",
                        "primary-fixed": "#d3e4ff",
                        "on-secondary": "#ffffff",
                        "on-surface-variant": "#424750",
                        "surface-container": "#ededf3",
                        "surface-container-lowest": "#ffffff",
                        "on-primary-fixed": "#001c38",
                        "background": "#f8f9ff",
                        "secondary-fixed": "#a3f69c",
                        "primary": "#003765"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "touch-target-min": "48px",
                        "stack-sm": "8px",
                        "screen-margin": "20px",
                        "gutter": "16px",
                        "stack-md": "16px",
                        "stack-lg": "24px"
                    },
                    "fontFamily": {
                        "headline-lg": ["Plus Jakarta Sans"],
                        "headline-lg-mobile": ["Plus Jakarta Sans"],
                        "label-lg": ["Plus Jakarta Sans"],
                        "body-lg": ["Plus Jakarta Sans"],
                        "headline-sm": ["Plus Jakarta Sans"],
                        "headline-md": ["Plus Jakarta Sans"],
                        "label-sm": ["Plus Jakarta Sans"],
                        "body-md": ["Plus Jakarta Sans"]
                    },
                    "fontSize": {
                        "headline-lg": ["32px", { "lineHeight": "40px", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                        "headline-lg-mobile": ["28px", { "lineHeight": "36px", "fontWeight": "700" }],
                        "label-lg": ["14px", { "lineHeight": "20px", "letterSpacing": "0.05em", "fontWeight": "600" }],
                        "body-lg": ["18px", { "lineHeight": "28px", "fontWeight": "400" }],
                        "headline-sm": ["20px", { "lineHeight": "28px", "fontWeight": "700" }],
                        "headline-md": ["24px", { "lineHeight": "32px", "fontWeight": "700" }],
                        "label-sm": ["12px", { "lineHeight": "16px", "fontWeight": "500" }],
                        "body-md": ["16px", { "lineHeight": "24px", "fontWeight": "400" }]
                    }
                }
            }
        }
    </script>
<style>
        body { background-color: #f8f9ff; }
        .checklist-item.active {
            border-color: #003765;
            background-color: #f3f3f9;
        }
        .checklist-item.active .check-icon {
            color: #1b6d24;
            font-variation-settings: 'FILL' 1;
        }
        /* Hide scrollbar for clean industrial look */
        ::-webkit-scrollbar { width: 0px; background: transparent; }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="antialiased text-on-surface flex flex-col h-screen overflow-hidden">
<!-- Status Chip (Persistent) -->
<div class="w-full flex justify-center py-2 bg-surface-bright z-50">
<div class="px-4 py-1 rounded-full bg-surface-container text-on-surface-variant font-label-sm text-label-sm flex items-center gap-2 shadow-sm border border-outline-variant">
<span class="w-2 h-2 rounded-full bg-secondary block"></span>
            已連線
        </div>
</div>
<!-- TopAppBar -->
<header class="w-full top-0 sticky bg-surface-bright shadow-sm flex justify-between items-center px-screen-margin h-touch-target-min z-40">
<button class="text-on-surface-variant flex items-center justify-center h-touch-target-min w-touch-target-min hover:bg-surface-container-high rounded-full active:scale-95 transition-transform duration-150">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
</button>
<h1 class="font-headline-sm text-headline-sm font-bold text-primary">安全檢查表</h1>
<div class="w-touch-target-min"></div> <!-- Spacer for centering -->
</header>
<!-- Main Canvas -->
<main class="flex-1 overflow-y-auto px-screen-margin pb-32 pt-stack-md flex flex-col gap-stack-md">
<div class="mb-stack-sm">
<p class="font-body-md text-body-md text-on-surface-variant">請在開始野外作業前完成以下安全確認。確保所有設備運作正常。</p>
</div>
<!-- Checklist Grid (Bento style) -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-gutter">
<!-- Item 1: GPS -->
<label class="checklist-item flex items-start gap-4 p-4 rounded-xl bg-surface-container-lowest shadow-[0_8px_16px_rgba(0,0,0,0.12)] border-2 border-transparent transition-all duration-200 cursor-pointer hover:bg-surface-container-low">
<input class="peer sr-only" type="checkbox"/>
<div class="flex-shrink-0 mt-1">
<span class="material-symbols-outlined check-icon text-outline text-[28px] transition-colors" data-icon="radio_button_unchecked">radio_button_unchecked</span>
</div>
<div class="flex flex-col gap-1">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-primary" data-icon="satellite_alt" data-weight="fill" style="font-variation-settings: 'FILL' 1;">satellite_alt</span>
<h2 class="font-label-lg text-label-lg text-on-surface">GPS 訊號確認</h2>
</div>
<p class="font-body-md text-body-md text-on-surface-variant mt-1">確認接收器已鎖定足夠的衛星以提供公尺級定位精度。</p>
</div>
</label>
<!-- Item 2: Battery -->
<label class="checklist-item flex items-start gap-4 p-4 rounded-xl bg-surface-container-lowest shadow-[0_8px_16px_rgba(0,0,0,0.12)] border-2 border-transparent transition-all duration-200 cursor-pointer hover:bg-surface-container-low">
<input class="peer sr-only" type="checkbox"/>
<div class="flex-shrink-0 mt-1">
<span class="material-symbols-outlined check-icon text-outline text-[28px] transition-colors" data-icon="radio_button_unchecked">radio_button_unchecked</span>
</div>
<div class="flex flex-col gap-1">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-secondary" data-icon="battery_charging_full" data-weight="fill" style="font-variation-settings: 'FILL' 1;">battery_charging_full</span>
<h2 class="font-label-lg text-label-lg text-on-surface">設備電量充足</h2>
</div>
<p class="font-body-md text-body-md text-on-surface-variant mt-1">主機與備用電池電量需大於 80%，並攜帶行動電源。</p>
</div>
</label>
<!-- Item 3: Safety Gear -->
<label class="checklist-item flex items-start gap-4 p-4 rounded-xl bg-surface-container-lowest shadow-[0_8px_16px_rgba(0,0,0,0.12)] border-2 border-transparent transition-all duration-200 cursor-pointer hover:bg-surface-container-low">
<input class="peer sr-only" type="checkbox"/>
<div class="flex-shrink-0 mt-1">
<span class="material-symbols-outlined check-icon text-outline text-[28px] transition-colors" data-icon="radio_button_unchecked">radio_button_unchecked</span>
</div>
<div class="flex flex-col gap-1">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-primary" data-icon="construction" data-weight="fill" style="font-variation-settings: 'FILL' 1;">construction</span>
<h2 class="font-label-lg text-label-lg text-on-surface">安全裝備穿戴</h2>
</div>
<p class="font-body-md text-body-md text-on-surface-variant mt-1">已穿戴高辨識度反光背心、防滑登山靴及防護手套。</p>
</div>
</label>
<!-- Item 4: Emergency Contact -->
<label class="checklist-item flex items-start gap-4 p-4 rounded-xl bg-surface-container-lowest shadow-[0_8px_16px_rgba(0,0,0,0.12)] border-2 border-transparent transition-all duration-200 cursor-pointer hover:bg-surface-container-low">
<input class="peer sr-only" type="checkbox"/>
<div class="flex-shrink-0 mt-1">
<span class="material-symbols-outlined check-icon text-outline text-[28px] transition-colors" data-icon="radio_button_unchecked">radio_button_unchecked</span>
</div>
<div class="flex flex-col gap-1">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-error" data-icon="perm_contact_calendar" data-weight="fill" style="font-variation-settings: 'FILL' 1;">perm_contact_calendar</span>
<h2 class="font-label-lg text-label-lg text-on-surface">緊急聯絡人設定</h2>
</div>
<p class="font-body-md text-body-md text-on-surface-variant mt-1">已確認衛星電話通訊正常，並設定預設緊急聯絡中心號碼。</p>
</div>
</label>
</div>
</main>
<!-- Fixed Bottom Action Area -->
<div class="fixed bottom-0 left-0 w-full p-screen-margin bg-surface-bright/90 backdrop-blur-md border-t border-surface-variant shadow-[0_-8px_24px_rgba(0,0,0,0.08)] z-50">
<button class="w-full h-touch-target-min rounded-full font-label-lg text-label-lg flex items-center justify-center gap-2 transition-all duration-200 bg-surface-variant text-on-surface-variant opacity-50 cursor-not-allowed" disabled="" id="confirm-btn">
<span class="material-symbols-outlined" data-icon="check_circle">check_circle</span>
            確認完成並開始作業
        </button>
</div>
<script>
        const checkboxes = document.querySelectorAll('.checklist-item input[type="checkbox"]');
        const confirmBtn = document.getElementById('confirm-btn');

        function updateChecklist() {
            let allChecked = true;
            
            checkboxes.forEach(checkbox => {
                const parent = checkbox.closest('.checklist-item');
                const icon = parent.querySelector('.check-icon');
                
                if (checkbox.checked) {
                    parent.classList.add('active');
                    icon.textContent = 'check_circle';
                    icon.setAttribute('data-icon', 'check_circle');
                } else {
                    parent.classList.remove('active');
                    icon.textContent = 'radio_button_unchecked';
                    icon.setAttribute('data-icon', 'radio_button_unchecked');
                    allChecked = false;
                }
            });

            if (allChecked) {
                confirmBtn.removeAttribute('disabled');
                confirmBtn.className = "w-full h-touch-target-min rounded-full font-label-lg text-label-lg flex items-center justify-center gap-2 transition-all duration-200 bg-primary text-on-primary shadow-md hover:bg-primary-container active:scale-[0.98] cursor-pointer";
            } else {
                confirmBtn.setAttribute('disabled', 'true');
                confirmBtn.className = "w-full h-touch-target-min rounded-full font-label-lg text-label-lg flex items-center justify-center gap-2 transition-all duration-200 bg-surface-variant text-on-surface-variant opacity-50 cursor-not-allowed";
            }
        }

        checkboxes.forEach(cb => {
            cb.addEventListener('change', updateChecklist);
        });
    </script>
</body></html>
