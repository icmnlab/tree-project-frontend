<!DOCTYPE html>

          font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;

<body class="bg-background text-on-background font-body-md h-screen w-full overflow-hidden flex flex-col relative">
<!-- Status Chip -->
<div class="absolute top-4 left-1/2 transform -translate-x-1/2 z-50 flex items-center bg-surface-container-high px-4 py-2 rounded-full shadow-[0_4px_16px_rgba(0,0,0,0.12)] border border-outline-variant">
<span class="w-2 h-2 rounded-full bg-secondary mr-2"></span>
<span class="font-label-sm text-label-sm text-on-surface">已連線</span>
</div>
<!-- TopAppBar -->
<header class="w-full top-0 sticky bg-surface-bright shadow-sm flex justify-between items-center px-screen-margin h-touch-target-min z-40">
<button class="w-touch-target-min h-touch-target-min flex items-center justify-center text-on-surface-variant hover:bg-surface-container-high rounded-full active:scale-95 transition-transform duration-150">
<span class="material-symbols-outlined" data-icon="leaderboard">leaderboard</span>
</button>
<h1 class="font-headline-sm text-headline-sm font-bold text-primary">Forest Intelligence</h1>
<button class="w-touch-target-min h-touch-target-min flex items-center justify-center text-on-surface-variant hover:bg-surface-container-high rounded-full active:scale-95 transition-transform duration-150">
<span class="material-symbols-outlined" data-icon="cloud_off">cloud_off</span>
</button>
</header>
<!-- Main Content (Map Canvas) -->
<main class="flex-grow relative w-full h-full">

<div class="absolute inset-0 bg-[url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI0MCIgaGVpZ2h0PSI0MCI+CjxyZWN0IHdpZHRoPSI0MCIgaGVpZ2h0PSI0MCIgZmlsbD0ibm9uZSIgc3Ryb2tlPSJyZ2JhKDI1NSwyNTUsMjU1LDAuMykiIHN0cm9rZS13aWR0aD0iMSIvPgo8L3N2Zz4=')] opacity-50"></div>
<!-- Sample Points -->
<!-- Completed -->
<button class="absolute top-[30%] left-[40%] w-touch-target-min h-touch-target-min flex items-center justify-center -translate-x-1/2 -translate-y-1/2 z-10 active:scale-90 transition-transform focus:outline-none">
<div class="w-8 h-8 rounded-full bg-secondary border-2 border-white shadow-lg flex items-center justify-center">
<span class="material-symbols-outlined text-white text-sm filled" data-icon="check">check</span>
</div>
</button>
<!-- In Progress -->
<button class="absolute top-[45%] left-[60%] w-touch-target-min h-touch-target-min flex items-center justify-center -translate-x-1/2 -translate-y-1/2 z-10 active:scale-90 transition-transform focus:outline-none">
<div class="w-8 h-8 rounded-full bg-primary border-2 border-white shadow-lg flex items-center justify-center ring-4 ring-primary/30">
<span class="material-symbols-outlined text-white text-sm" data-icon="pending">pending</span>
</div>
<!-- Ping Animation -->
<span class="absolute inline-flex h-full w-full rounded-full bg-primary opacity-20 animate-ping"></span>
</button>
<!-- Pending -->
<button class="absolute top-[60%] left-[30%] w-touch-target-min h-touch-target-min flex items-center justify-center -translate-x-1/2 -translate-y-1/2 z-10 active:scale-90 transition-transform focus:outline-none">
<div class="w-8 h-8 rounded-full bg-surface-variant border-2 border-white shadow-lg flex items-center justify-center">
<span class="material-symbols-outlined text-on-surface-variant text-sm" data-icon="location_on">location_on</span>
</div>
</button>
<button class="absolute top-[70%] left-[75%] w-touch-target-min h-touch-target-min flex items-center justify-center -translate-x-1/2 -translate-y-1/2 z-10 active:scale-90 transition-transform focus:outline-none">
<div class="w-8 h-8 rounded-full bg-surface-variant border-2 border-white shadow-lg flex items-center justify-center">
<span class="material-symbols-outlined text-on-surface-variant text-sm" data-icon="location_on">location_on</span>
</div>
</button>
</div>
<!-- Floating Action Buttons -->
<div class="absolute right-screen-margin bottom-[calc(5rem+80px)] flex flex-col gap-stack-sm z-20">
<button class="w-12 h-12 rounded-full bg-surface-container-lowest text-on-surface shadow-[0_4px_16px_rgba(0,0,0,0.18)] flex items-center justify-center active:scale-90 transition-transform duration-200 border border-outline-variant">
<span class="material-symbols-outlined" data-icon="my_location">my_location</span>
</button>
<button class="w-14 h-14 rounded-full bg-primary text-on-primary shadow-[0_4px_16px_rgba(0,0,0,0.18)] flex items-center justify-center active:scale-90 transition-transform duration-200">
<span class="material-symbols-outlined text-2xl" data-icon="add_location">add_location</span>
</button>
</div>
<!-- Bottom Sheet (Point Details) -->
<div class="absolute bottom-[80px] left-0 w-full px-screen-margin pb-stack-md z-30 transition-transform duration-300 ease-in-out">
<div class="bg-surface-container-lowest rounded-xl shadow-[0_-4px_16px_rgba(0,0,0,0.18)] p-stack-md border border-outline-variant/50">
<div class="flex justify-between items-start mb-stack-sm">
<div>
<div class="flex items-center gap-2 mb-1">
<span class="px-2 py-1 bg-primary-container text-on-primary-container font-label-sm text-label-sm rounded-full">進行中</span>
<h2 class="font-headline-sm text-headline-sm text-on-surface">Sample Point A-12</h2>
</div>
<p class="font-body-md text-body-md text-on-surface-variant flex items-center gap-1">
<span class="material-symbols-outlined text-[16px]" data-icon="explore">explore</span>
                            24.529° N, 121.842° E
                        </p>
</div>
<button class="w-10 h-10 flex items-center justify-center text-on-surface-variant hover:bg-surface-container rounded-full">
<span class="material-symbols-outlined" data-icon="close">close</span>
</button>
</div>
<div class="grid grid-cols-2 gap-gutter mt-stack-md">
<div class="bg-surface-container-low p-stack-sm rounded-lg">
<span class="font-label-sm text-label-sm text-outline block mb-1">目標樹種</span>
<span class="font-label-lg text-label-lg text-on-surface">台灣扁柏 (Chamaecyparis)</span>
</div>
<div class="bg-surface-container-low p-stack-sm rounded-lg">
<span class="font-label-sm text-label-sm text-outline block mb-1">指派審核員</span>
<span class="font-label-lg text-label-lg text-on-surface">Dr. Lin</span>
</div>
</div>
<button class="w-full mt-stack-md bg-primary text-on-primary h-touch-target-min rounded-lg font-label-lg text-label-lg flex items-center justify-center gap-2 shadow-sm active:scale-95 transition-transform">
<span class="material-symbols-outlined" data-icon="edit_document">edit_document</span>
                    開始採樣記錄
                </button>
</div>
</div>

<span class="font-label-sm text-label-sm mt-1">地圖</span>

<span class="material-symbols-outlined" data-icon="forest">forest</span>
<span class="font-label-sm text-label-sm mt-1">採樣</span>
</button>
<button class="flex flex-col items-center justify-center text-on-surface-variant hover:bg-surface-variant rounded-full px-5 py-1 active:scale-90 transition-all duration-200">

</button>

<span class="material-symbols-outlined" data-icon="settings">settings</span>
<span class="font-label-sm text-label-sm mt-1">設定</span>
</button>
</nav>

<nav class="hidden md:flex fixed top-0 right-screen-margin h-touch-target-min items-center gap-gutter z-50">
<button class="text-primary font-label-lg text-label-lg px-4 h-full border-b-2 border-primary flex items-center gap-2">
<span class="material-symbols-outlined filled" data-icon="map">map</span> 地圖
        </button>
<button class="text-on-surface-variant font-label-lg text-label-lg px-4 h-full hover:bg-surface-container-high flex items-center gap-2 rounded-t-md">
<span class="material-symbols-outlined" data-icon="forest">forest</span> 採樣
        </button>
<button class="text-on-surface-variant font-label-lg text-label-lg px-4 h-full hover:bg-surface-container-high flex items-center gap-2 rounded-t-md">
<span class="material-symbols-outlined" data-icon="sync">sync</span> 同步
        </button>
<button class="text-on-surface-variant font-label-lg text-label-lg px-4 h-full hover:bg-surface-container-high flex items-center gap-2 rounded-t-md">
<span class="material-symbols-outlined" data-icon="settings">settings</span> 設定
        </button>
</nav>
