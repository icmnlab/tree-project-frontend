<script>
        document.addEventListener('DOMContentLoaded', () => {
            const btnFlash = document.getElementById('btn-flash');
            const iconFlash = document.getElementById('icon-flash');
            let flashOn = false;

            btnFlash.addEventListener('click', () => {
                flashOn = !flashOn;
                iconFlash.textContent = flashOn ? 'flash_on' : 'flash_off';
                if(flashOn) {
                    btnFlash.classList.add('bg-white', 'text-black');
                    btnFlash.classList.remove('bg-black/40', 'text-white');
                } else {
                    btnFlash.classList.remove('bg-white', 'text-black');
                    btnFlash.classList.add('bg-black/40', 'text-white');
                }
            });

            const modeAuto = document.getElementById('mode-auto');
            const modeManual = document.getElementById('mode-manual');
            const boundingBox = document.getElementById('bounding-box');

            modeManual.addEventListener('click', () => {
                modeManual.classList.add('bg-primary', 'text-on-primary');
                modeManual.classList.remove('text-white/70');
                modeAuto.classList.remove('bg-primary', 'text-on-primary');
                modeAuto.classList.add('text-white/70');
                boundingBox.classList.remove('border-tertiary-container', 'shadow-[0_0_20px_rgba(120,27,159,0.3)]');
                boundingBox.classList.add('border-outline', 'border-dashed');
                boundingBox.querySelector('.animate-scanline').style.display = 'none';
            });

            modeAuto.addEventListener('click', () => {
                modeAuto.classList.add('bg-primary', 'text-on-primary');
                modeAuto.classList.remove('text-white/70');
                modeManual.classList.remove('bg-primary', 'text-on-primary');
                modeManual.classList.add('text-white/70');
                boundingBox.classList.add('border-tertiary-container', 'shadow-[0_0_20px_rgba(120,27,159,0.3)]');
                boundingBox.classList.remove('border-outline', 'border-dashed');
                boundingBox.querySelector('.animate-scanline').style.display = 'block';
            });

            const btnShutter = document.getElementById('btn-shutter');
            const resultPanel = document.getElementById('result-panel');
            const bottomControls = document.getElementById('bottom-controls');
            const scanArea = document.getElementById('scan-area');
            const btnRetake = document.getElementById('btn-retake');

            btnShutter.addEventListener('click', () => {
                // Simulate shutter effect
                const flash = document.createElement('div');
                flash.className = 'absolute inset-0 bg-white z-[60] transition-opacity duration-300';
                document.body.appendChild(flash);
                
                setTimeout(() => {
                    flash.style.opacity = '0';
                    setTimeout(() => flash.remove(), 300);
                }, 50);

                // Show results
                resultPanel.classList.remove('translate-y-full');
                bottomControls.classList.add('opacity-0', 'pointer-events-none');
                scanArea.classList.add('opacity-0', 'pointer-events-none');
            });

            btnRetake.addEventListener('click', () => {
                resultPanel.classList.add('translate-y-full');
                bottomControls.classList.remove('opacity-0', 'pointer-events-none');
                scanArea.classList.remove('opacity-0', 'pointer-events-none');
            });
        });
    </script>
