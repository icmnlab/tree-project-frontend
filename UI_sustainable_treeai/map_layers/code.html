<!-- Simple interaction script for visual feedback -->
<script>
        document.addEventListener('DOMContentLoaded', () => {
            const toggles = document.querySelectorAll('label.cursor-pointer');
            toggles.forEach(toggle => {
                toggle.addEventListener('click', (e) => {
                    // Prevent default to handle custom switch animation manually for demonstration
                    e.preventDefault(); 
                    const switchContainer = toggle.querySelector('.relative.inline-flex');
                    const knob = toggle.querySelector('.transform');
                    
                    const isOn = switchContainer.classList.contains('bg-primary');
                    
                    if (isOn) {
                        switchContainer.classList.remove('bg-primary');
                        switchContainer.classList.add('bg-surface-variant', 'border', 'border-outline');
                        knob.classList.remove('translate-x-6', 'bg-surface-container-lowest', 'ml-0.5');
                        knob.classList.add('translate-x-0.5', 'bg-outline');
                    } else {
                        switchContainer.classList.add('bg-primary');
                        switchContainer.classList.remove('bg-surface-variant', 'border', 'border-outline');
                        knob.classList.add('translate-x-6', 'bg-surface-container-lowest', 'ml-0.5');
                        knob.classList.remove('translate-x-0.5', 'bg-outline');
                    }
                });
            });
        });
    </script>
